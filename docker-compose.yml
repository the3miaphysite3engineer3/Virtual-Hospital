version: "3.9"

# =============================================================
#  Smart Hospital — On-Premises Docker Stack
#  Services:  PostgreSQL 18  +  Grafana 10  +  pgAdmin
# =============================================================

services:
  # -----------------------------------------------------------
  # PostgreSQL — relational database server
  # -----------------------------------------------------------
  postgres:
    image: postgres:18
    container_name: hospital-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_hospital
      POSTGRES_USER: hospital_user
      POSTGRES_PASSWORD: hospital_pass_2024
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital_user -d smart_hospital -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hospital_net

  # -----------------------------------------------------------
  # Grafana — analytics dashboard
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: hospital-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: hospital_admin_2024
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - hospital_net

  # -----------------------------------------------------------
  # pgAdmin — web UI for PostgreSQL
  # -----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: hospital-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hospital.local
      PGADMIN_DEFAULT_PASSWORD: hospital_pgadmin_2024
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8080:80"
    networks:
      - hospital_net

# =============================================================
volumes:
  postgres_data:
  grafana_data:

networks:
  hospital_net:
    driver: bridge
